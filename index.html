<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Escolar - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <nav class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i data-lucide="graduation-cap" class="w-8 h-8"></i>
                <span class="text-xl font-bold tracking-tight">EduManage QR</span>
            </div>
            <div class="flex space-x-2">
                <button onclick="exportarBackup()" class="bg-indigo-700 hover:bg-indigo-800 px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition">
                    <i data-lucide="download" class="w-4 h-4"></i> Backup JS
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="space-y-6 lg:col-span-1">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold flex items-center gap-2 text-slate-900">
                        <i data-lucide="qr-code" class="text-indigo-600"></i> Escáner de Asistencia
                    </h2>
                </div>
                <div id="reader" class="overflow-hidden rounded-xl bg-slate-100 border-2 border-dashed border-slate-300" style="width: 100%;"></div>
                <div class="mt-3 flex gap-2">
                    <button onclick="iniciarEscaner()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 px-3 rounded-lg text-sm font-medium transition flex items-center justify-center gap-1">
                        <i data-lucide="camera" class="w-4 h-4"></i> Encender
                    </button>
                    <button onclick="detenerEscaner()" class="flex-1 bg-rose-600 hover:bg-rose-700 text-white py-2 px-3 rounded-lg text-sm font-medium transition flex items-center justify-center gap-1">
                        <i data-lucide="camera-off" class="w-4 h-4"></i> Apagar
                    </button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold flex items-center gap-2 text-slate-900 mb-4">
                    <i data-lucide="calendar-check" class="text-indigo-600"></i> Registro Manual / Historial
                </h2>
                <button onclick="abrirModalAsistencia()" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-semibold py-2.5 px-4 rounded-xl text-sm transition flex items-center justify-center gap-2">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Gestionar Historial Asistencias
                </button>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <div>
                        <h1 class="text-xl font-bold text-slate-900">Panel de Estudiantes</h1>
                        <p class="text-sm text-slate-500">Gestión de datos de matrículas activas.</p>
                    </div>
                    <button onclick="modalEstudiante()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-xl text-sm shadow-sm transition flex items-center justify-center gap-2 self-start sm:self-auto">
                        <i data-lucide="user-plus" class="w-4 h-4"></i> Nuevo Estudiante
                    </button>
                </div>

                <div class="overflow-x-auto rounded-xl border border-slate-100">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-600 uppercase text-xs font-bold tracking-wider border-b border-slate-100">
                                <th class="p-4">DNI / Alumno</th>
                                <th class="p-4">Género/Edad</th>
                                <th class="p-4">Teléfono</th>
                                <th class="p-4 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaEstudiantes" class="divide-y divide-slate-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. Carga Inicial de los 14 Registros Solicitados
        let estudiantes = [
            { dni: "45891234", nombres: "Carlos Alberto", apellidos: "Mendoza Ruiz", genero: "Masculino", edad: 34, telefono: "987654321" },
            { dni: "71234567", nombres: "Ana Lucía", apellidos: "Gómez Peralta", genero: "Femenino", edad: 28, telefono: "951753462" },
            { dni: "10457893", nombres: "Luis Fernando", apellidos: "Castro Villalobos", genero: "Masculino", edad: 42, telefono: "963852741" },
            { dni: "48963215", nombres: "María Fernanda", apellidos: "Quispe Rojas", genero: "Femenino", edad: 31, telefono: "912345678" },
            { dni: "09632587", nombres: "Jorge Luis", apellidos: "Flores Mamani", genero: "Masculino", edad: 45, telefono: "999888777" },
            { dni: "74125896", nombres: "Claudia Elena", apellidos: "Chávez Gutiérrez", genero: "Femenino", edad: 25, telefono: "944555666" },
            { dni: "42369874", nombres: "Ricardo Andrés", apellidos: "Morales Delgado", genero: "Masculino", edad: 38, telefono: "922111333" },
            { dni: "15987423", nombres: "Sofía Beatriz", apellidos: "Torres Navarro", genero: "Femenino", edad: 29, telefono: "933777888" },
            { dni: "47852136", nombres: "Javier Enrique", apellidos: "Salazar Herrera", genero: "Masculino", edad: 51, telefono: "955666444" },
            { dni: "70258963", nombres: "Diana Marcela", apellidos: "Palomino Cruz", genero: "Femenino", edad: 27, telefono: "966222111" },
            { dni: "08965412", nombres: "Alejandro José", apellidos: "Vega Benítez", genero: "Masculino", edad: 60, telefono: "911444777" },
            { dni: "44521369", nombres: "Valeria Inés", Medina: "Paredes", apellidos: "Medina Paredes", genero: "Femenino", edad: 33, telefono: "977888999" },
            { dni: "73142536", nombres: "Roberto Carlos", apellidos: "Villanueva Soto", genero: "Masculino", edad: 23, telefono: "988333222" },
            { dni: "41253698", nombres: "Gabriela Alejandra", apellidos: "Ramos Fuentes", genero: "Femenino", edad: 36, telefono: "944111555" }
        ];

        let asistencias = [];
        let html5QrcodeScanner = null;

        // Inicializar renderizado al cargar
        document.addEventListener("DOMContentLoaded", () => {
            renderEstudiantes();
            lucide.createIcons();
        });

        // 2. Renderizar Lista de Estudiantes
        function renderEstudiantes() {
            const tbody = document.getElementById("tablaEstudiantes");
            tbody.innerHTML = "";
            estudiantes.forEach((est, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4">
                            <div class="font-bold text-slate-900">${est.nombres} ${est.apellidos}</div>
                            <div class="text-xs text-slate-400 font-mono">DNI: ${est.dni}</div>
                        </td>
                        <td class="p-4 text-slate-600">
                            <span class="px-2 py-0.5 rounded-full text-xs ${est.genero === 'Masculino' ? 'bg-blue-50 text-blue-700':'bg-pink-50 text-pink-700'}">${est.genero}</span>
                            <div class="text-xs mt-1 text-slate-500">${est.edad} años</div>
                        </td>
                        <td class="p-4 text-slate-600 font-mono text-xs">${est.telefono}</td>
                        <td class="p-4 text-right space-x-1">
                            <button onclick="modalEstudiante(${index})" class="p-1.5 inline-flex items-center rounded-md bg-amber-50 text-amber-700 hover:bg-amber-100 transition"><i data-lucide="edit" class="w-4 h-4"></i></button>
                            <button onclick="eliminarEstudiante(${index})" class="p-1.5 inline-flex items-center rounded-md bg-rose-50 text-rose-700 hover:bg-rose-100 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                `;
            });
            lucide.createIcons();
        }

        // 3. CRUD Estudiantes con SweetAlert2
        async function modalEstudiante(index = null) {
            const esEdicion = index !== null;
            const datos = esEdicion ? estudiantes[index] : { dni: '', nombres: '', apellidos: '', genero: 'Masculino', edad: '', telefono: '' };

            const { value: formValues } = await Swal.fire({
                title: esEdicion ? 'Editar Estudiante' : 'Registrar Nuevo Estudiante',
                html: `
                    <input id="swal-dni" class="swal2-input" placeholder="DNI" value="${datos.dni}" ${esEdicion ? 'disabled':''}>
                    <input id="swal-nombres" class="swal2-input" placeholder="Nombres" value="${datos.nombres}">
                    <input id="swal-apellidos" class="swal2-input" placeholder="Apellidos" value="${datos.apellidos}">
                    <select id="swal-genero" class="swal2-input">
                        <option value="Masculino" ${datos.genero === 'Masculino' ? 'selected' : ''}>Masculino</option>
                        <option value="Femenino" ${datos.genero === 'Femenino' ? 'selected' : ''}>Femenino</option>
                    </select>
                    <input id="swal-edad" type="number" class="swal2-input" placeholder="Edad" value="${datos.edad}">
                    <input id="swal-telefono" class="swal2-input" placeholder="Teléfono" value="${datos.telefono}">
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Guardar',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    const dni = document.getElementById('swal-dni').value.trim();
                    const nombres = document.getElementById('swal-nombres').value.trim();
                    const apellidos = document.getElementById('swal-apellidos').value.trim();
                    const genero = document.getElementById('swal-genero').value;
                    const edad = document.getElementById('swal-edad').value;
                    const telefono = document.getElementById('swal-telefono').value.trim();

                    if (!dni || !nombres || !apellidos || !edad || !telefono) {
                        Swal.showValidationMessage('Todos los campos son obligatorios');
                        return false;
                    }
                    return { dni, nombres, apellidos, genero, edad: parseInt(edad), telefono };
                }
            });

            if (formValues) {
                if (esEdicion) {
                    estudiantes[index] = formValues;
                    Swal.fire('¡Actualizado!', 'Datos guardados correctamente.', 'success');
                } else {
                    if(estudiantes.some(e => e.dni === formValues.dni)) {
                        Swal.fire('Error', 'El DNI ingresado ya existe.', 'error');
                        return;
                    }
                    estudiantes.push(formValues);
                    Swal.fire('¡Registrado!', 'Estudiante añadido.', 'success');
                }
                renderEstudiantes();
            }
        }

        function eliminarEstudiante(index) {
            Swal.fire({
                title: '¿Estás seguro?',
                text: `Se eliminará a ${estudiantes[index].nombres} permanentemente.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    estudiantes.splice(index, 1);
                    renderEstudiantes();
                    Swal.fire('Eliminado', 'El registro ha sido removido.', 'success');
                }
            });
        }

        // 4. Integración del Lector de Códigos QR
        function iniciarEscaner() {
            detenerEscaner(); // Limpiar instancias previas
            html5QrcodeScanner = new Html5Qrcode("reader");
            
            // Configura para usar de preferencia la cámara trasera del dispositivo móvil
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    // Acción al leer un QR (el código QR debe contener el DNI numérico del alumno)
                    registrarAsistenciaPorDni(decodedText.trim());
                },
                (errorMessage) => { /* Silenciar logs excesivos de escaneo en tiempo real */ }
            ).catch(err => {
                Swal.fire('Error de cámara', 'No se pudo acceder a la cámara. Revisa los permisos.', 'error');
            });
        }

        function detenerEscaner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById("reader").innerHTML = "";
                }).catch(err => console.log("Escáner detenido de forma preventiva."));
            }
        }

        function registrarAsistenciaPorDni(dni) {
            const estudiante = estudiantes.find(e => e.dni === dni);
            if (!estudiante) {
                Swal.fire('Código Inválido', `No existe estudiante registrado con DNI: ${dni}`, 'error');
                return;
            }

            const hoy = new Date().toISOString().split('T')[0];
            const yaAsistio = asistencias.some(a => a.dni === dni && a.fecha === hoy);

            if (yaAsistio) {
                Swal.fire('Aviso', `${estudiante.nombres} ya registró asistencia el día de hoy.`, 'warning');
            } else {
                asistencias.push({ dni, nombreCompleto: `${estudiante.nombres} ${estudiante.apellidos}`, fecha: hoy, estado: 'Presente' });
                Swal.fire('¡Asistencia Grabada!', `${estudiante.nombres} ha sido marcado como PRESENTE.`, 'success');
            }
        }

        // 5. Gestión del Calendario e Historial de Asistencias
        async function abrirModalAsistencia() {
            let optionsEstudiantes = estudiantes.map(e => `<option value="${e.dni}">${e.nombres} ${e.apellidos}</option>`).join('');
            let tablaHistorial = asistencias.map((a, i) => `
                <tr class="border-b border-slate-100 text-xs">
                    <td class="p-2 text-left">${a.nombreCompleto}</td>
                    <td class="p-2">${a.fecha}</td>
                    <td class="p-2 font-bold text-emerald-600">${a.estado}</td>
                    <td class="p-2"><button onclick="eliminarAsistencia(${i})" class="text-rose-600 font-bold">X</button></td>
                </tr>
            `).join('');

            if(asistencias.length === 0) {
                tablaHistorial = `<tr><td colspan="4" class="p-4 text-slate-400 text-center text-xs">No hay registros cargados.</td></tr>`;
            }

            await Swal.fire({
                title: 'Historial & Control Manual de Asistencias',
                width: '600px',
                html: `
                    <div class="bg-slate-50 p-3 rounded-lg text-left mb-4">
                        <label class="block text-xs font-bold text-slate-600 mb-1">Registrar Manualmente:</label>
                        <div class="flex gap-1">
                            <select id="asist-dni" class="p-2 text-xs border rounded w-full">${optionsEstudiantes}</select>
                            <input id="asist-fecha" type="date" class="p-2 text-xs border rounded" value="${new Date().toISOString().split('T')[0]}">
                            <button onclick="agregarAsistenciaManual()" class="bg-indigo-600 text-white text-xs px-3 rounded font-bold">Añadir</button>
                        </div>
                    </div>
                    <div class="max-h-60 overflow-y-auto">
                        <table class="w-full text-center border-collapse">
                            <thead>
                                <tr class="bg-slate-100 text-slate-600 font-bold text-xs">
                                    <th class="p-2 text-left">Estudiante</th>
                                    <th class="p-2">Fecha</th>
                                    <th class="p-2">Estado</th>
                                    <th class="p-2">Acción</th>
                                </tr>
                            </thead>
                            <tbody>${tablaHistorial}</tbody>
                        </table>
                    </div>
                `,
                showConfirmButton: true,
                confirmButtonText: 'Cerrar'
            });
        }

        function agregarAsistenciaManual() {
            const dni = document.getElementById('asist-dni').value;
            const fecha = document.getElementById('asist-fecha').value;
            const est = estudiantes.find(e => e.dni === dni);

            if(!dni || !fecha) return;

            asistencias.push({ dni, nombreCompleto: `${est.nombres} ${est.apellidos}`, fecha, estado: 'Presente' });
            Swal.close();
            abrirModalAsistencia();
        }

        function eliminarAsistencia(index) {
            asistencias.splice(index, 1);
            Swal.close();
            abrirModalAsistencia();
        }

        // 6. Exportación de Copia de Seguridad (Backup .JS)
        function exportarBackup() {
            const datosBackup = {
                fechaExportacion: new Date().toISOString(),
                estudiantes: estudiantes,
                asistencias: asistencias
            };

            const contenidoArchivo = `// Backup del Sistema Escolar \nconst backupData = ${JSON.stringify(datosBackup, null, 4)};`;
            const blob = new Blob([contenidoArchivo], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_sistema_${new Date().toISOString().split('T')[0]}.js`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            Swal.fire('Backup Exitoso', 'Se ha descargado el archivo JS con los datos.', 'success');
        }
    </script>
</body>
</html>
