<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Escolar + QR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <nav class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">🏫 Control de Estudiantes y Asistencia QR</h1>
        <button onclick="exportarBackup()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded font-semibold text-sm transition">
            💾 Exportar Backup (JS)
        </button>
    </nav>

    <div class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-700">📋 Listado de Estudiantes</h2>
                <button onclick="abrirFormularioEstudiante()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded text-sm font-medium">
                    + Agregar Estudiante
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-gray-200 text-gray-600 uppercase text-xs animate-pulse border-b border-gray-300">
                            <th class="p-3">DNI</th>
                            <th class="p-3">Estudiante</th>
                            <th class="p-3">Género / Edad</th>
                            <th class="p-3">Teléfono</th>
                            <th class="p-3 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaEstudiantes" class="divide-y divide-gray-200 text-gray-700">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-bold text-gray-700 mb-3">📷 Escáner de Asistencia QR</h2>
                <div id="reader" class="w-full bg-gray-50 rounded-lg overflow-hidden border border-dashed border-gray-300"></div>
                <div class="mt-3 flex gap-2">
                    <button onclick="iniciarEscaneo()" class="w-full bg-indigo-500 text-white py-2 rounded text-sm font-medium hover:bg-indigo-600">Encender Cámara</button>
                    <button onclick="detenerEscaneo()" class="w-full bg-gray-400 text-white py-2 rounded text-sm font-medium hover:bg-gray-500">Apagar</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-bold text-gray-700 mb-2">📅 Registro Manual / Calendario</h2>
                <p class="text-xs text-gray-500 mb-4">Selecciona una fecha para interactuar o registrar asistencia manualmente.</p>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600">Fecha de Control:</label>
                        <input type="date" id="fechaAsistencia" class="w-full p-2 border rounded mt-1 text-sm bg-gray-50">
                    </div>
                    <button onclick="abrirFormularioAsistenciaManual()" class="w-full bg-emerald-500 text-white py-2 rounded text-sm font-medium hover:bg-emerald-600">
                        ✍️ Registrar Asistencia Manual
                    </button>
                    <button onclick="verHistorialAsistencia()" class="w-full bg-amber-500 text-white py-2 rounded text-sm font-medium hover:bg-amber-600">
                        👁️ Ver Reporte de la Fecha
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 1. Data Inicial (15 registros solicitados)
        let estudiantes = [
            { dni: "72145896", nombres: "Mateo Alejandro", apellidos: "Palomino Quispe", genero: "Masculino", edad: 19, telefono: "987654321" },
            { dni: "45871239", nombres: "Valeria Sofía", apellidos: "Flores Mendoza", genero: "Femenino", edad: 21, telefono: "951753852" },
            { dni: "70258964", nombres: "Diego Alonso", apellidos: "Ramirez Torres", genero: "Masculino", edad: 18, telefono: "963852741" },
            { dni: "48965321", nombres: "Camila Belén", apellidos: "Castro Gutiérrez", genero: "Femenino", edad: 22, telefono: "942135768" },
            { dni: "76541298", nombres: "Joaquin Omar", apellidos: "Huamán Rojas", genero: "Masculino", edad: 20, telefono: "918273645" },
            { dni: "44125896", nombres: "Luciana Andrea", apellidos: "Vargas Paredes", genero: "Femenino", edad: 23, telefono: "999888777" },
            { dni: "73514892", nombres: "Sebastian Elián", apellidos: "Morales Sanchez", genero: "Masculino", edad: 19, telefono: "924516837" },
            { dni: "41258963", nombres: "Maria Fernanda", apellidos: "Chávez Diaz", genero: "Femenino", edad: 24, telefono: "931642759" },
            { dni: "71985246", nombres: "Nicolas André", apellidos: "Espinoza Cruz", genero: "Masculino", edad: 18, telefono: "974123658" },
            { dni: "46852179", nombres: "Daniela Alexandra", apellidos: "Benitez Silva", genero: "Femenino", edad: 20, telefono: "955444333" },
            { dni: "75412963", nombres: "Gabriel Omar", apellidos: "Gonzales Rey", genero: "Masculino", edad: 21, telefono: "962148735" },
            { dni: "49852164", nombres: "Antonella Noemí", apellidos: "Villanueva Rios", genero: "Femenino", edad: 19, telefono: "917359246" },
            { dni: "72635418", nombres: "Matias Gonzalo", apellidos: "Aguilar Medina", genero: "Masculino", edad: 22, telefono: "981624357" },
            { dni: "43521698", nombres: "Claudia Jimena", Salazar: "Peña", genero: "Femenino", edad: 20, telefono: "943852167" },
            { dni: "70943185", nombres: "Franco David", apellidos: "Navarro Herrera", genero: "Masculino", edad: 23, telefono: "929182736" }
        ];

        // Estructura de asistencias: { "YYYY-MM-DD": [ "dni1", "dni2" ] }
        let asistencias = {};
        let html5QrcodeScanner = null;

        // Establecer fecha de hoy por defecto en el input
        document.getElementById('fechaAsistencia').value = new Date().toISOString().split('T')[0];

        // Renderizar Tabla
        function renderTabla() {
            const tbody = document.getElementById("tablaEstudiantes");
            tbody.innerHTML = "";
            estudiantes.forEach((est, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-3 font-mono font-bold text-gray-600">${est.dni}</td>
                        <td class="p-3">
                            <div class="font-medium text-gray-900">${est.nombres}</div>
                            <div class="text-xs text-gray-500">${est.apellidos || ''}</div>
                        </td>
                        <td class="p-3 text-xs">
                            <span class="px-2 py-0.5 rounded-full ${est.genero === 'Masculino' ? 'bg-blue-100 text-blue-800' : 'bg-pink-100 text-pink-800'}">${est.genero}</span>
                            <span class="ml-1 text-gray-500">${est.edad} años</span>
                        </td>
                        <td class="p-3 text-xs text-gray-600">${est.telefono}</td>
                        <td class="p-3 text-center space-x-1 whitespace-nowrap">
                            <button onclick="abrirFormularioEstudiante(${index})" class="bg-amber-100 hover:bg-amber-200 text-amber-800 px-2 py-1 rounded text-xs transition">Editar</button>
                            <button onclick="eliminarEstudiante(${index})" class="bg-red-100 hover:bg-red-200 text-red-800 px-2 py-1 rounded text-xs transition">Eliminar</button>
                        </td>
                    </tr>
                `;
            });
        }

        // 2. CRUD Estudiantes con SweetAlert2
        async function abrirFormularioEstudiante(index = null) {
            const esEdicion = index !== null;
            const est = esEdicion ? estudiantes[index] : { dni:'', nombres:'', apellidos:'', genero:'Masculino', edad:'', telefono:'' };

            const { value: formValues } = await Swal.fire({
                title: esEdicion ? '✏️ Editar Estudiante' : '➕ Registrar Estudiante',
                html: `
                    <input id="swal-dni" class="swal2-input" placeholder="DNI" value="${est.dni}" ${esEdicion ? 'disabled' : ''}>
                    <input id="swal-nombres" class="swal2-input" placeholder="Nombres" value="${est.nombres}">
                    <input id="swal-apellidos" class="swal2-input" placeholder="Apellidos" value="${est.apellidos || ''}">
                    <select id="swal-genero" class="swal2-input">
                        <option value="Masculino" ${est.genero==='Masculino'?'selected':''}>Masculino</option>
                        <option value="Femenino" ${est.genero==='Femenino'?'selected':''}>Femenino</option>
                    </select>
                    <input id="swal-edad" type="number" class="swal2-input" placeholder="Edad" value="${est.edad}">
                    <input id="swal-telefono" class="swal2-input" placeholder="Teléfono" value="${est.telefono}">
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Guardar',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    const dni = document.getElementById('swal-dni').value.trim();
                    const nombres = document.getElementById('swal-nombres').value.trim();
                    const apellidos = document.getElementById('swal-apellidos').value.trim();
                    const genero = document.getElementById('swal-genero').value;
                    const edad = document.getElementById('swal-edad').value;
                    const telefono = document.getElementById('swal-telefono').value.trim();

                    if (!dni || !nombres || !apellidos || !edad) {
                        Swal.showValidationMessage('Por favor rellena los campos obligatorios');
                        return false;
                    }
                    return { dni, nombres, apellidos, genero, edad: parseInt(edad), telefono };
                }
            });

            if (formValues) {
                if (esEdicion) {
                    estudiantes[index] = { ...estudiantes[index], ...formValues };
                    Swal.fire('¡Actualizado!', 'Datos modificados correctamente.', 'success');
                } else {
                    if(estudiantes.some(e => e.dni === formValues.dni)) {
                        Swal.fire('Error', 'El DNI ingresado ya existe.', 'error');
                        return;
                    }
                    estudiantes.push(formValues);
                    Swal.fire('¡Registrado!', 'Estudiante agregado con éxito.', 'success');
                }
                renderTabla();
            }
        }

        function eliminarEstudiante(index) {
            Swal.fire({
                title: '¿Estás seguro?',
                text: `Vas a eliminar a ${estudiantes[index].nombres}`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    estudiantes.splice(index, 1);
                    Swal.fire('Eliminado', 'El registro ha sido borrado.', 'success');
                    renderTabla();
                }
            });
        }

        // 3. Control de Asistencia (Lector QR e interacción)
        function procesarAsistenciaPorDni(dni) {
            const fecha = document.getElementById('fechaAsistencia').value;
            const estudiante = estudiantes.find(e => e.dni === dni);

            if (!estudiante) {
                Swal.fire('No encontrado', `El DNI ${dni} no pertenece a ningún estudiante.`, 'error');
                return false;
            }

            if (!asistencias[fecha]) asistencias[fecha] = [];

            if (asistencias[fecha].includes(dni)) {
                Swal.fire('Aviso', `${estudiante.nombres} ya tiene registro de asistencia hoy.`, 'info');
                return false;
            }

            asistencias[fecha].push(dni);
            Swal.fire('¡Asistencia Registrada!', `Pasó lista: ${estudiante.nombres} ${estudiante.apellidos || ''}`, 'success');
            return true;
        }

        function iniciarEscaneo() {
            if(!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5Qrcode("reader");
            }
            
            html5QrcodeScanner.start(
                { facingMode: "environment" }, // Abre la cámara trasera en móviles
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    // Detener momentáneamente tras leer para evitar bucles de lectura
                    detenerEscaneo();
                    procesarAsistenciaPorDni(decodedText.trim());
                },
                (errorMessage) => { /* Silenciar errores de escaneo continuo */ }
            ).catch(err => Swal.fire('Error de cámara', 'No se pudo acceder al dispositivo de video.', 'error'));
        }

        function detenerEscaneo() {
            if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
                html5QrcodeScanner.stop().catch(err => console.log(err));
            }
        }

        // Formulario Asistencia Manual
        async function abrirFormularioAsistenciaManual() {
            const fecha = document.getElementById('fechaAsistencia').value;
            if(!asistencias[fecha]) asistencias[fecha] = [];

            // Generar los checkboxes de estudiantes
            let opcionesHtml = `<div class="text-left space-y-2 max-h-60 overflow-y-auto p-2">`;
            estudiantes.forEach(est => {
                const checked = asistencias[fecha].includes(est.dni) ? 'checked' : '';
                opcionesHtml += `
                    <label class="flex items-center space-x-2 text-sm">
                        <input type="checkbox" value="${est.dni}" ${checked} class="swal-chk-asistencia rounded border-gray-300">
                        <span><strong>${est.dni}</strong> - ${est.nombres}</span>
                    </label>
                `;
            });
            opcionesHtml += `</div>`;

            await Swal.fire({
                title: `Asistencia: ${fecha}`,
                html: opcionesHtml,
                showCancelButton: true,
                confirmButtonText: 'Actualizar Asistencia',
                preConfirm: () => {
                    const checkboxes = document.querySelectorAll('.swal-chk-asistencia');
                    let seleccionados = [];
                    checkboxes.forEach(cb => {
                        if(cb.checked) seleccionados.push(cb.value);
                    });
                    return seleccionados;
                }
            }).then((result) => {
                if(result.isConfirmed) {
                    asistencias[fecha] = result.value;
                    Swal.fire('Guardado', 'Control de asistencia actualizado.', 'success');
                }
            });
        }

        function verHistorialAsistencia() {
            const fecha = document.getElementById('fechaAsistencia').value;
            const presentesDni = asistencias[fecha] || [];

            if(presentesDni.length === 0) {
                Swal.fire(`Reporte: ${fecha}`, 'No hay asistencias registradas para esta fecha.', 'info');
                return;
            }

            let listaHtml = `<ul class="text-left list-disc list-inside text-sm space-y-1">`;
            presentesDni.forEach(dni => {
                const est = estudiantes.find(e => e.dni === dni);
                if(est) listaHtml += `<li>${est.nombres} ${est.apellidos || ''} (${dni})</li>`;
            });
            listaHtml += `</ul>`;

            Swal.fire({
                title: `Presentes el ${fecha}`,
                html: listaHtml,
                icon: 'info'
            });
        }

        // 4. Exportación de archivo de copia de seguridad (JS File)
        function exportarBackup() {
            const dataBackup = {
                fechaExportacion: new Date().toISOString(),
                estudiantes: estudiantes,
                asistencias: asistencias
            };

            const contenidoJs = `// Backup del Sistema de Gestión Escolar\nconst backupData = ${JSON.stringify(dataBackup, null, 4)};`;
            
            const blob = new Blob([contenidoJs], { type: "application/javascript;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.href = url;
            link.download = `backup_sistema_${new Date().toISOString().split('T')[0]}.js`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Carga inicial
        renderTabla();
    </script>
</body>
</html>
