<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión y Asistencia - QR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .calendar-day.present { background-color: #10B981; color: white; }
        .calendar-day.absent { background-color: #EF4444; color: white; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <nav class="bg-blue-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-users-gear mr-2"></i>RR.HH. Control Panel</h1>
            <button onclick="exportarBackup()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-sm font-semibold transition">
                <i class="fa-solid fa-download mr-1"></i> Exportar Backup (JS)
            </button>
        </div>
    </nav>

    <div class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow space-y-6">
            <div class="flex justify-between items-center border-b pb-3">
                <h2 class="text-lg font-bold text-gray-700">Listado de Trabajadores</h2>
                <button onclick="abrirFormulario()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm font-semibold">
                    <i class="fa-solid fa-user-plus mr-1"></i> Nuevo Trabajador
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-gray-200 text-gray-700 uppercase text-xs">
                            <th class="p-3">DNI / ID</th>
                            <th class="p-3">Trabajador</th>
                            <th class="p-3">Género/Edad</th>
                            <th class="p-3">Teléfono</th>
                            <th class="p-3 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-trabajadores">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-bold text-gray-700 border-b pb-3 mb-4"><i class="fa-solid fa-qrcode mr-2"></i>Escáner de Asistencia</h2>
                <div id="reader" class="w-full bg-gray-50 rounded" style="max-width: 100%;"></div>
                <div class="mt-4 flex gap-2">
                    <button onclick="iniciarEscaneo()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded font-semibold text-sm">
                        <i class="fa-solid fa-camera mr-1"></i> Abrir Cámara
                    </button>
                    <button onclick="detenerEscaneo()" class="w-full bg-gray-500 hover:bg-gray-600 text-white py-2 rounded font-semibold text-sm">
                        Detener
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex justify-between items-center border-b pb-3 mb-4">
                    <h2 class="text-lg font-bold text-gray-700"><i class="fa-solid fa-calendar-days mr-2"></i>Asistencias</h2>
                    <button onclick="abrirRegistroAsistenciaManual()" class="text-xs bg-gray-200 hover:bg-gray-300 px-2 py-1 rounded font-medium">
                        Registro Manual
                    </button>
                </div>
                
                <label class="block text-xs font-semibold text-gray-600 mb-1">Seleccionar Trabajador para ver Historial:</label>
                <select id="select-trabajador-consulta" onchange="renderizarCalendario()" class="w-full p-2 border rounded mb-4 text-sm"></select>

                <div class="text-center font-bold text-sm text-blue-600 mb-2" id="mes-año-actual"></div>
                <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-gray-500 mb-1">
                    <div>D</div><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div>
                </div>
                <div id="calendario-dias" class="grid grid-cols-7 gap-1 text-center text-xs"></div>
            </div>
        </div>

    </div>

    <script>
        // 14 Registros Iniciales Base
        const registrosIniciales = [
            { dni: "45891234", nombres: "Carlos Alberto", apellidos: "Mendoza Ruiz", genero: "Masculino", edad: 34, telefono: "987654321" },
            { dni: "71234567", nombres: "Ana Lucía", apellidos: "Gómez Peralta", genero: "Femenino", edad: 28, telefono: "951753462" },
            { dni: "10457893", nombres: "Luis Fernando", apellidos: "Castro Villalobos", genero: "Masculino", edad: 42, telefono: "963852741" },
            { dni: "48963215", nombres: "María Fernanda", apellidos: "Quispe Rojas", genero: "Femenino", edad: 31, telefono: "912345678" },
            { dni: "09632587", nombres: "Jorge Luis", apellidos: "Flores Mamani", genero: "Masculino", edad: 45, telefono: "999888777" },
            { dni: "74125896", nombres: "Claudia Elena", apellidos: "Chávez Gutiérrez", genero: "Femenino", edad: 25, telefono: "944555666" },
            { dni: "42369874", nombres: "Ricardo Andrés", Morales: "Delgado", apellidos: "Morales Delgado", genero: "Masculino", edad: 38, telefono: "922111333" },
            { dni: "15987423", nombres: "Sofía Beatriz", apellidos: "Torres Navarro", genero: "Femenino", edad: 29, telefono: "933777888" },
            { dni: "47852136", nombres: "Javier Enrique", apellidos: "Salazar Herrera", genero: "Masculino", edad: 51, telefono: "955666444" },
            { dni: "70258963", nombres: "Diana Marcela", apellidos: "Palomino Cruz", genero: "Femenino", edad: 27, telefono: "966222111" },
            { dni: "08965412", nombres: "Alejandro José", apellidos: "Vega Benítez", genero: "Masculino", edad: 60, telefono: "911444777" },
            { dni: "44521369", nombres: "Valeria Inés", apellidos: "Medina Paredes", genero: "Femenino", edad: 33, telefono: "977888999" },
            { dni: "73142536", nombres: "Roberto Carlos", apellidos: "Villanueva Soto", genero: "Masculino", edad: 23, telefono: "988333222" },
            { dni: "41253698", nombres: "Gabriela Alejandra", apellidos: "Ramos Fuentes", genero: "Femenino", edad: 36, telefono: "944111555" }
        ];

        // Inicializar Estado desde LocalStorage o usar la base
        let trabajadores = JSON.parse(localStorage.getItem('trabajadores')) || registrosIniciales;
        let asistencias = JSON.parse(localStorage.getItem('asistencias')) || []; 
        // Estructura asistencia: { dni: '...', fecha: 'YYYY-MM-DD', estado: 'Presente'/'Ausente' }

        let html5QrcodeScanner = null;
        const fechaActual = new Date();

        // --- INICIALIZACIÓN ---
        document.addEventListener("DOMContentLoaded", () => {
            actualizarTablasYCombos();
            renderizarCalendario();
        });

        function guardarEnLocalStorage() {
            localStorage.setItem('trabajadores', JSON.stringify(trabajadores));
            localStorage.setItem('asistencias', JSON.stringify(asistencias));
        }

        function actualizarTablasYCombos() {
            const tbody = document.getElementById('tabla-trabajadores');
            const selectConsulta = document.getElementById('select-trabajador-consulta');
            
            tbody.innerHTML = '';
            selectConsulta.innerHTML = '';

            trabajadores.forEach(t => {
                // Fila de Tabla
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 font-semibold text-gray-600">${t.dni}</td>
                        <td class="p-3">${t.nombres} ${t.apellidos}</td>
                        <td class="p-3">${t.genero} (${t.edad} años)</td>
                        <td class="p-3">${t.telefono}</td>
                        <td class="p-3 text-center space-x-1">
                            <button onclick="abrirFormulario('${t.dni}')" class="text-blue-600 hover:text-blue-900 bg-blue-50 p-1.5 rounded"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="eliminarTrabajador('${t.dni}')" class="text-red-600 hover:text-red-900 bg-red-50 p-1.5 rounded"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
                // Opción en combo de consulta
                selectConsulta.innerHTML += `<option value="${t.dni}">${t.apellidos}, ${t.nombres}</option>`;
            });
        }

        // --- CRUD TRABAJADORES (Formularios Interactivos con SweetAlert2) ---
        async function abrirFormulario(dniEditar = null) {
            const t = trabajadores.find(item => item.dni === dniEditar);
            
            const { value: formValues } = await Swal.fire({
                title: t ? 'Editar Trabajador' : 'Registrar Nuevo Trabajador',
                html: `
                    <input id="swal-dni" class="swal2-input" placeholder="DNI" value="${t ? t.dni : ''}" ${t ? 'disabled' : ''}>
                    <input id="swal-nombres" class="swal2-input" placeholder="Nombres" value="${t ? t.nombres : ''}">
                    <input id="swal-apellidos" class="swal2-input" placeholder="Apellidos" value="${t ? t.apellidos : ''}">
                    <select id="swal-genero" class="swal2-input">
                        <option value="Masculino" ${t && t.genero==='Masculino'?'selected':''}>Masculino</option>
                        <option value="Femenino" ${t && t.genero==='Femenino'?'selected':''}>Femenino</option>
                    </select>
                    <input id="swal-edad" type="number" class="swal2-input" placeholder="Edad" value="${t ? t.edad : ''}">
                    <input id="swal-telefono" class="swal2-input" placeholder="Teléfono" value="${t ? t.telefono : ''}">
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Guardar',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    const dni = document.getElementById('swal-dni').value.trim();
                    const nombres = document.getElementById('swal-nombres').value.trim();
                    const apellidos = document.getElementById('swal-apellidos').value.trim();
                    const genero = document.getElementById('swal-genero').value;
                    const edad = document.getElementById('swal-edad').value;
                    const telefono = document.getElementById('swal-telefono').value.trim();

                    if (!dni || !nombres || !apellidos || !edad || !telefono) {
                        Swal.showValidationMessage('Por favor llena todos los campos');
                        return false;
                    }
                    if (!t && trabajadores.some(item => item.dni === dni)) {
                        Swal.showValidationMessage('El DNI ya se encuentra registrado');
                        return false;
                    }
                    return { dni, nombres, apellidos, genero, edad: parseInt(edad), telefono };
                }
            });

            if (formValues) {
                if (t) {
                    // Modo Edición
                    Object.assign(t, formValues);
                    Swal.fire('¡Actualizado!', 'Los datos fueron modificados con éxito.', 'success');
                } else {
                    // Modo Registro
                    trabajadores.push(formValues);
                    Swal.fire('¡Registrado!', 'El trabajador fue añadido correctamente.', 'success');
                }
                guardarEnLocalStorage();
                actualizarTablasYCombos();
            }
        }

        function eliminarTrabajador(dni) {
            Swal.fire({
                title: '¿Estás seguro?',
                text: `Se eliminará el trabajador con DNI ${dni} y sus asistencias.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#EF4444',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    trabajadores = trabajadores.filter(t => t.dni !== dni);
                    asistencias = asistencias.filter(a => a.dni !== dni);
                    guardarEnLocalStorage();
                    actualizarTablasYCombos();
                    renderizarCalendario();
                    Swal.fire('Eliminado', 'El registro ha sido borrado.', 'success');
                }
            });
        }

        // --- CONTROL DE ASISTENCIA MANUAL ---
        async function abrirRegistroAsistenciaManual() {
            let opcionesTrabajadores = trabajadores.map(t => `<option value="${t.dni}">${t.apellidos}, ${t.nombres}</option>`).join('');
            
            const { value: formAsistencia } = await Swal.fire({
                title: 'Registrar Asistencia Manual',
                html: `
                    <select id="asist-dni" class="swal2-input">${opcionesTrabajadores}</select>
                    <input id="asist-fecha" type="date" class="swal2-input" value="${fechaActual.toISOString().split('T')[0]}">
                    <select id="asist-estado" class="swal2-input">
                        <option value="Presente">Presente</option>
                        <option value="Ausente">Ausente</option>
                    </select>
                `,
                showCancelButton: true,
                confirmButtonText: 'Registrar',
                preConfirm: () => {
                    return {
                        dni: document.getElementById('asist-dni').value,
                        fecha: document.getElementById('asist-fecha').value,
                        estado: document.getElementById('asist-estado').value
                    }
                }
            });

            if (formAsistencia) {
                procesarAsistencia(formAsistencia.dni, formAsistencia.fecha, formAsistencia.estado);
            }
        }

        function procesarAsistencia(dni, fecha, estado = "Presente") {
            const empleado = trabajadores.find(t => t.dni === dni);
            if (!empleado) {
                Swal.fire('Error', 'Código QR o DNI no válido.', 'error');
                return false;
            }

            // Evitar duplicados del mismo día, sobrescribiendo el estado si ya existía
            asistencias = asistencias.filter(a => !(a.dni === dni && a.fecha === fecha));
            asistencias.push({ dni, fecha, estado });
            
            guardarEnLocalStorage();
            renderizarCalendario();
            
            Swal.fire('Asistencia Registrada', `${empleado.nombres} marcado como: <strong>${estado}</strong> el ${fecha}`, 'success');
            return true;
        }

        // --- LECTOR QR INTEGRADO (CÁMARA MÓVIL) ---
        function iniciarEscaneo() {
            document.getElementById("reader").innerHTML = ""; // Limpiar contenedor
            html5QrcodeScanner = new Html5Qrcode("reader");
            
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            // Inicia usando la cámara trasera de preferencia ('environment')
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    // Al leer con éxito el QR (se asume que el QR contiene el DNI del trabajador)
                    const hoy = new Date().toISOString().split('T')[0];
                    const exito = procesarAsistencia(decodedText.trim(), hoy, "Presente");
                    if(exito) detenerEscaneo();
                },
                (errorMessage) => { /* Silenciar errores de lectura continuos */ }
            ).catch(err => {
                Swal.fire('Error de Cámara', 'No se pudo acceder a la cámara del dispositivo.', 'error');
            });
        }

        function detenerEscaneo() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById("reader").innerHTML = "";
                }).catch(err => console.log("Error al detener cámara:", err));
            }
        }

        // --- CALENDARIO DE SEGUIMIENTO DINÁMICO ---
        function renderizarCalendario() {
            const dniSeleccionado = document.getElementById('select-trabajador-consulta').value;
            const contenedorDias = document.getElementById('calendario-dias');
            const contenedorMesAño = document.getElementById('mes-año-actual');
            
            if(!dniSeleccionado) return;

            contenedorDias.innerHTML = '';
            
            const año = fechaActual.getFullYear();
            const mes = fechaActual.getMonth(); // Mes en curso
            
            const nombresMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            contenedorMesAño.innerText = `${nombresMeses[mes]} ${año}`;

            const primerDiaMes = new Date(año, mes, 1).getDay();
            const totalDiasMes = new Date(año, mes + 1, 0).getDate();

            // Espacios en blanco para cuadrar el primer día de la semana
            for (let i = 0; i < primerDiaMes; i++) {
                contenedorDias.innerHTML += `<div></div>`;
            }

            // Renderizar los días del mes en curso
            for (let dia = 1; dia <= totalDiasMes; dia++) {
                const mesFormateado = String(mes + 1).padStart(2, '0');
                const diaFormateado = String(dia).padStart(2, '0');
                const fechaIterada = `${año}-${mesFormateado}-${diaFormateado}`;

                // Buscar si tiene registro en esta fecha
                const registro = asistencias.find(a => a.dni === dniSeleccionado && a.fecha === fechaIterada);
                
                let claseEstado = "bg-gray-100 text-gray-700";
                if (registro) {
                    claseEstado = registro.estado === "Presente" ? "present" : "absent";
                }

                contenedorDias.innerHTML += `
                    <div class="p-2 rounded font-medium shadow-sm calendar-day ${claseEstado}">
                        ${dia}
                    </div>
                `;
            }
        }

        // --- EXPORTAR BACKUP (ARCHIVO .JS) ---
        function exportarBackup() {
            const dataBackup = {
                fecha_respaldo: new Date().toISOString(),
                trabajadores: trabajadores,
                asistencias: asistencias
            };

            // Estructuramos el contenido como código JS ejecutable/declarativo
            const contenidoArchivo = `// BACKUP DEL SISTEMA DE GESTIÓN\nconst BACKUP_DATA = ${JSON.stringify(dataBackup, null, 4)};`;
            
            const blob = new Blob([contenidoArchivo], { type: "application/javascript;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            
            const elementoLink = document.createElement("a");
            elementoLink.href = url;
            elementoLink.download = `backup_sistema_${new Date().toISOString().split('T')[0]}.js`;
            document.body.appendChild(elementoLink);
            elementoLink.click();
            document.body.removeChild(elementoLink);
            
            Swal.fire('¡Éxito!', 'Se ha descargado el archivo JS con el backup de tus datos.', 'success');
        }
    </script>
</body>
</html>
