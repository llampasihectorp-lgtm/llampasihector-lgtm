<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Códigos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .btn-danger {
            background-color: #e74c3c;
        }
        .btn-danger:hover {
            background-color: #c0392b;
        }

        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Estilos para la tabla de registros */
        .history-container {
            margin-top: 25px;
            text-align: left;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #34495e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #ecf0f1;
            color: #2c3e50;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .no-data {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Escáner de Códigos QR / Barras</h1>
    
    <button id="btn-toggle" class="btn">Iniciar Cámara</button>
    
    <div id="reader" style="display: none;"></div>

    <div class="history-container">
        <h2>
            <span>Códigos Registrados</span>
            <button id="btn-clear" style="background:none; border:none; color:#e74c3c; cursor:pointer; font-size:0.85rem;">Limpiar todo</button>
        </h2>
        
        <table>
            <thead>
                <tr>
                    <th>Datos</th>
                    <th>Fecha y Hora</th>
                </tr>
            </thead>
            <tbody id="lista-codigos">
                </tbody>
        </table>
    </div>
</div>

<script>
    const btnToggle = document.getElementById('btn-toggle');
    const btnClear = document.getElementById('btn-clear');
    const readerDiv = document.getElementById('reader');
    const listaCodigos = document.getElementById('lista-codigos');
    
    let html5QrCode;
    let isScanning = false;

    // Inicializar el escáner al cargar la página
    document.addEventListener("DOMContentLoaded", () => {
        html5QrCode = new Html5QrCode("reader");
        cargarHistorial();
    });

    // Evento del botón Iniciar/Detener
    btnToggle.addEventListener('click', () => {
        if (!isScanning) {
            encenderCamara();
        } else {
            apagarCamara();
        }
    });

    // Limpiar el historial
    btnClear.addEventListener('click', () => {
        if(confirm("¿Seguro que deseas eliminar todos los registros?")) {
            localStorage.removeItem('codigosEscaneados');
            cargarHistorial();
        }
    });

    function encenderCamara() {
        readerDiv.style.display = "block";
        btnToggle.textContent = "Cerrar Cámara";
        btnToggle.classList.add("btn-danger");
        isScanning = true;

        // Configuración del escáner: prioriza la cámara trasera en móviles
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            onScanSuccess
        ).catch((err) => {
            console.error("Error al iniciar la cámara: ", err);
            alert("No se pudo acceder a la cámara. Asegúrate de dar los permisos necesarios.");
            apagarCamara();
        });
    }

    function apagarCamara() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                readerDiv.style.display = "none";
                btnToggle.textContent = "Iniciar Cámara";
                btnToggle.classList.remove("btn-danger");
                isScanning = false;
            }).catch((err) => console.error("Error al detener la cámara.", err));
        }
    }

    // Qué pasa cuando reconoce un código con éxito
    function onScanSuccess(decodedText, decodedResult) {
        // Detener la cámara momentáneamente para evitar múltiples lecturas del mismo código
        apagarCamara();

        // Obtener fecha y hora actual formateada
        const ahora = new Date();
        const fechaHora = ahora.toLocaleString('es-PE', { 
            day: '2-digit', 
            month: '2-digit', 
            year: 'numeric', 
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit' 
        });

        // Guardar en almacenamiento local
        guardarEnLocal(decodedText, fechaHora);
        
        // Hacer vibrar el móvil (si el dispositivo lo soporta) como feedback
        if (navigator.vibrate) navigator.vibrate(200);

        // Alerta visual de éxito
        alert(`Código detectado: ${decodedText}`);
    }

    function guardarEnLocal(texto, fecha) {
        let historial = JSON.parse(localStorage.getItem('codigosEscaneados')) || [];
        // Insertar al inicio para que el último escaneado aparezca arriba
        historial.unshift({ texto, fecha }); 
        localStorage.setItem('codigosEscaneados', JSON.stringify(historial));
        cargarHistorial();
    }

    function cargarHistorial() {
        let historial = JSON.parse(localStorage.getItem('codigosEscaneados')) || [];
        listaCodigos.innerHTML = "";

        if (historial.length === 0) {
            listaCodigos.innerHTML = `<tr><td colspan="2" class="no-data">No hay códigos registrados todavía.</td></tr>`;
            return;
        }

        historial.forEach(item => {
            const fila = document.createElement('tr');
            
            // Si el texto es un enlace, hacerlo cliqueable
            let contenidoCelda = item.texto;
            if(item.texto.startsWith('http://') || item.texto.startsWith('https://')) {
                contenidoCelda = `<a href="${item.texto}" target="_blank" style="color: #3498db;">${item.texto}</a>`;
            }

            fila.innerHTML = `
                <td>${contenidoCelda}</td>
                <td>${item.fecha}</td>
            `;
            listaCodigos.appendChild(fila);
        });
    }
</script>

</body>
</html>
